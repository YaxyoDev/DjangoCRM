{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrandStudy — Kirish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

    <!-- 3D shape orqa fon -->
    <div class="scene">
        <div class="shape shape--torus"></div>
        <div class="shape shape--sphere"></div>
        <div class="shape shape--cube">
            <span class="face face--front"></span>
            <span class="face face--back"></span>
            <span class="face face--right"></span>
            <span class="face face--left"></span>
            <span class="face face--top"></span>
            <span class="face face--bottom"></span>
        </div>
        <div class="shape shape--pyramid">
            <span class="pface pface--base"></span>
            <span class="pface pface--f"></span>
            <span class="pface pface--b"></span>
            <span class="pface pface--l"></span>
            <span class="pface pface--r"></span>
        </div>
        <div class="shape shape--ring"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="login-wrap">
        <div class="card">
            <header class="card__head">
                <div class="logo-dot"></div>
                <h1 class="card__title">GrandStudy</h1>
                <p class="card__subtitle">Log In</p>
            </header>

            {% if messages %}
            <div class="alerts">
                {% for message in messages %}
                <div class="alert alert--{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}

            <form class="form" method="post" action="" novalidate>
                {% csrf_token %}

                <!-- Telefon -->
                <div class="field">
                    <span class="field__prefix">+998</span>
                    <input
                        type="tel"
                        id="phone"
                        name="phone_display"
                        class="field__input field__input--phone"
                        inputmode="numeric"
                        autocomplete="tel"
                        maxlength="13"
                        required>
                    <label for="phone" class="field__label field__label--phone">Telefon raqam</label>
                </div>

                <!-- Parol -->
                <div class="field">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="field__input"
                        autocomplete="current-password"
                        required>
                    <label for="password" class="field__label">Parol</label>
                    <button type="button" class="field__toggle" id="togglePass" aria-label="Parolni ko'rsatish">
                        <svg viewBox="0 0 24 24" width="20" height="20" class="eye"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>

                <button type="submit" class="btn">
                    <span>Kirish</span>
                    <svg viewBox="0 0 24 24" width="18" height="18" class="btn__arrow"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                </button>
            </form>
        </div>
    </main>

    <script src="{% static 'js/login.js' %}"></script>
</body>
</html>
